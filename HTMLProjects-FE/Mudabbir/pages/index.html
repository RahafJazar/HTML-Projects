<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <!----Google Fonts: IBM Plex Sans Arabic-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!---CSS-->
    <link rel="stylesheet" href="../css/style.css">
    <title>Muddabir</title>

</head>

<body>
    <div class="layout">
        <div class="container">
            <div class="sidebar">
                <div class="sidebar-title">
                    <div class="icon-container  p-15 bd-radius-15">
                        <img src="../images/svgexport-1.svg" alt="" class="icon">
                    </div>
                    <div>
                        <h1>مدّبر</h1>
                        <p>إدارة أموالك بذكاء</p>
                    </div>
                </div>
                <div class="sidebar-menu">
                    <ul>
                        <li>
                            <a href="#">
                                <img src="../images/svgexport-2.svg" alt="Home" class="icon">
                                <span>الصفحة الرئيسية</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="../images/svgexport-3.svg" alt="transactions" class="icon">
                                <span>المعاملات</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="../images/svgexport-4.svg" alt="budget" class="icon">
                                <span>الميزانيات</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="../images/svgexport-5.svg" alt="saving" class="icon">
                                <span>المدخرات</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="../images/svgexport-6.svg" alt="monthly bills" class="icon">
                                <span>الفواتير الشهرية </span>
                            </a>
                        </li>
                    </ul>

                </div>
                <div class="sidebar-quick-procedures">
                    <h3>إجراءات سريعة </h3>
                    <div class="procedures">
                        <button class="procedure">
                            <div class="bg-blue-200">
                                <img src="../images/svgexport-7.svg" alt="send">
                            </div>
                            <span>إرسال أموال</span>
                        </button>
                        <button class="procedure">
                            <div class="bg-green-200">
                                <img src="../images/svgexport-8.svg" alt="add">
                            </div>
                            <span>إضافة أموال</span>
                        </button>
                        <button class="procedure">
                            <div class="bg-purple-200">
                                <img src="../images/svgexport-9.svg" alt="pay">
                            </div>
                            <span>دفع فاتورة </span>
                        </button>
                        <button class="procedure">
                            <div class="bg-orange-200">
                                <img src="../images/svgexport-10.svg" alt="invest">
                            </div>
                            <span>استثمار</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="workspace">
                <div class="header-bar">

                    <div class="muddabir-logo">
                        <div class="icon-container  p-15 bd-radius-15">
                            <img src="../images/svgexport-1.svg" alt="" class="icon">
                        </div>
                        <div>
                            <h1>مدّبر</h1>
                            <p>إدارة أموالك بذكاء</p>
                        </div>
                    </div>

                    <div class="notifications">
                        <div>
                            <button>
                                <img src="../images/svgexport-12.svg" alt="search">
                            </button>
                            <button>
                                <img src="../images/svgexport-13.svg" alt="notifications">
                            </button>
                        </div>
                        <div>
                            <div class="user-info">
                                <p>سيف أسامة</p>
                                <p>حساب مميز</p>
                            </div>
                            <div class="user-img">
                                <img src="../images/user.png" alt="user picture">
                            </div>

                        </div>
                    </div>
                    <div class="status">
                        <div class="circle"></div>
                        <p>متصل</p>
                    </div>

                </div>
                <div class="summary-cards">

                </div>
                <div class="recent-transactions">

                </div>
                <div class="monthly-bills">

                </div>
                <div class="incomeVsExpenses-chart">

                </div>
                <div class="payment-method">

                </div>
                <div class="account-summary">

                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta name="keywords" content="SVG, Scalable ,Vector, Graphics ">
    <meta name="description" content="This page descripe SVG">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <!--Circle SVG -->
    <svg width="100" height="100" style="border:1px solid black;">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="5" fill="yellow">
        </circle>
    </svg>

    <!--Rectangle SVG -->
    <svg width="400" height="150" style="border:1px solid black;">
        <rect x="10" y="10" width="200" height="100" stroke="yellow" stroke-width="4" fill="green"></rect>
    </svg>

    <!--Rectangle with opacity and rounded corners SVG -->
    <svg width="300" height="200" style="border:1px solid black;">
        <rect x="40" y="10" width="150" height="150" rx="20" ry="20" stroke="black" stroke-width="4" fill="red"
            opacity="0.5">
        </rect>
    </svg>

    <!--Star SVG-->
    <svg width="300" height="200" style="border:1px solid black;">
        <polygon points="100,10 40,198 190,78 10,78 160,198" fill="lime" stroke="purple" stroke-width="4"
            fill-rule="evenodd">

        </polygon>
    </svg>


    <!-- Triangle SVG -->
    <svg width="200" height="200" style="border:1px solid black;">
        <polygon points="100,10 10,150 190,150"></polygon>
    </svg>

    <!---Gradient Ellipse and Text-->
    <svg width="200" height="200" style="border:1px solid black;">
        <defs>
            <linearGradient id="grad1">
                <stop offset="0%" stop-color="yellow"></stop>
                <stop offset="100%" stop-color="red"></stop>
            </linearGradient>
        </defs>
        <ellipse cx="100" cy="100" rx="85" ry="55" fill="url(#grad1)">

        </ellipse>
        <text fill="#fff" font-size="45" font-family="verdana" x="50" y="115">
            SVG
        </text>
    </svg>

    <video width="320" height="240" controls>
        <source src="./videos/video1OGG.ogg" type="video/ogg">
        <source src="./videos/video2MP4.mp4" type="video/mp4">

    </video>




</body>

</html>

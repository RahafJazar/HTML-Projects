<!DOCTYPE html>
<html>

<head>
    <meta name="keywords" content="media, mp4 ,ogg ">
    <meta name="description" content="This page descripe Html media">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        #control-buttons button {
            border: none;
            border-radius: 10px;
            color: blue;
            margin-right: 5px;
            background-color: rgba(199, 199, 199, 0.448);
        }
    </style>
</head>

<body>
    <div style="text-align: center;" id="control-buttons">
        <button onclick="playPause()">Play/Pause</button>
        <button onclick="makeBig()">Big</button>
        <button onclick="makeSmall()">Small</button>
        <button onclick="makeNormal()">Normal</button>
    </div>
    <br><br>
    <video id="video1" width="320" height="240">
        <source src="./videos/video2MP4.mp4" type="video/mp4">
        <source src="./videos/video1OGG.ogg" type="video/ogg">
        <track src="./videos/Subtitles/subtitle_en.vtt" kind="subtitles" srclang="en" label="English" default>

    </video>

    <audio controls autoplay>
        <source src="./audios/audio1.mp3" type="audio/mpeg">

    </audio>



    <script>
        let myVideo = document.getElementById("video1");
        //تفعيل الترجمة تلقائيا 
        myVideo.textTracks[0].mode = 'showing'; // يظهر التراك الأول (الترجمة)
        function playPause() {
            if (myVideo.paused) {
                myVideo.play();
            } else {
                myVideo.pause();
            }
        }
        function makeSmall() {
            myVideo.width = 280;
        }
        function makeBig() {
            myVideo.width = 400;
        }
        function makeNormal() {
            myVideo.width = 320;
        }
    </script>
</body>

</html>

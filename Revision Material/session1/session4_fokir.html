<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-----------------Normalize.css(reset)--------------------->
    <link rel="stylesheet" href="./css/Normalize.css">
    <title>Document</title>
    <style>
        /*general*/
        .clear {
            clear: both;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .navbar {
            background-color: rgb(209, 208, 208);
        }

        .navbar .logo {


            float: left;
            margin-top: 10px;
            margin-bottom: 10px;

        }

        .navbar .logo h1 {
            margin: 0 !important;
            padding: 0 !important;


        }

        .navbar .logo h1 a {

            color: brown;

        }

        .navbar .links {
            padding: 0 !important;
            float: right;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .navbar .links ul {
            list-style-type: none;
            margin: 0 !important;
            padding: 10px;


        }

        .navbar .links ul li {
            display: inline-block;
            margin-right: 10px;
        }

        .hero {
            background-color: yellowgreen;
            height: 100vh;
            display: flow-root;

        }

        .hero .text {
            text-align: center;
            width: 50%;
            margin: auto;
            margin-top: 30px;
            color: white;

        }

        .hero .text h2 {
            font-size: 50px;
            color: brown;
            text-transform: capitalize;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="container">
            <div class="logo">
                <h1><a href="#">Fokir</a></h1>
            </div>
            <div class="links">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Services</a></li>
                    <li><a href="">Portfolio</a></li>
                    <li><a href="">Testimonial</a></li>
                    <li><a href="">Blog</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
            </div>
            <div class="clear"></div>
        </div>

    </div>

    <div class="hero">
        <div class="text">
            <span>Hello I'm</span>
            <h2>Alix smith</h2>
            <p>professional web develooper</p>
        </div>
    </div>
</body>

</html>

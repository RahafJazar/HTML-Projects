<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register to request smart city services quickly and securely ">
    <meta name="keywords" content="register , forms , input, label">
    <title>Smart City Portal | Service Registration</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
</head>

<body>
    <!--- ============HEADER ============================ -->
    <header>
        <h1>📝 Service Registration</h1>
        <p>Please fill out the form below to request a city service.</p>
    </header>

    <!--  ===========NAVIGATION =========================== -->
    <nav>
        <ul>
            <li><a href="index.html" target="_blank">Home</a></li>
            <li><a href="services.html" target="_blank">Services</a></li>
            <li><a href="register.html" target="_blank">Register</a></li>
            <li><a href="media.html" target="_blank">Media</a></li>
        </ul>
    </nav>

    <!--- ===========MAIN CONTENT ========================== -->
    <main>
        <!-- ============Form======================-->
        <form action="#" method="get">
            <!-- ======Personal Informations===== -->
            <fieldset>
                <legend>Personal Informations</legend>

                <label for="full-name">Full Name: </label> <br>
                <input type="text" name="fullName" id="full-name" placeholder="Enter Your FullName" required>
                <br> <br>
                <label for="email">Email Address:</label> <br>
                <input type="email" name="Email" id="email" placeholder="example@email.com" required>
                <br> <br>
                <label for="password">Password:</label><br>
                <input type="password" name="Pasword" id="password" placeholder="Create a strong Password" required>
                <br><br>
                <label for="dob">Date Of Birth:</label>
                <input type="date" name="Date" id="dob" required>
            </fieldset>
            <br>
            <!-- ======Service Selection===== -->
            <fieldset>
                <legend>Service Selection</legend>

                <!-- Select Dropdown-->
                <label for="service">Select Service</label> <br>
                <select name="ServiceType" id="service" required>
                    <option value="">--Choose a Service--</option>
                    <option value="transport">Transport</option>
                    <option value="utilities">Utilities</option>
                    <option value="waste">Waste Management</option>
                    <option value="health">Health &amp; Safety</option>
                </select>

                <br><br>
                <!-- Radio Button -->
                <p>Request Priority :</p>
                <input type="radio" id="normal" value="normal" name="Priority" checked>
                <label for="normal">Normal</label>

                <input type="radio" id="urgent" value="urgent" name="Priority">
                <label for="urgent">Urgent</label>

                <br><br>
                <!-- CheckBoxes-->
                <p>Additional options</p>
                <input type="checkbox" id="smsNotify" name="Notification" value="sms">
                <label for="smsNotify">SMS Notifications</label>
                <input type="checkbox" id="emailNotify" name="Notification" value="email" checked>
                <label for="emailNotify">Email Notifications</label>
            </fieldset>
            <br>
            <!-- ====== System Informations ===== -->
            <fieldset>
                <legend>System Informations</legend>
                <label for="user-id">UserId</label> <br>
                <input type="text" id="user-id" name="userId" value="Auto-Generated" readonly>
            </fieldset>
            <br>
            <!-- ====== Form Buttons===== -->
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>


        </form>
    </main>
    <!----===========FOOTER ==============================   -->
    <footer>
        <p> &copy; 2025 Smart City Portal &nbsp; 🏙️ </p>
    </footer>
</body>

</html>

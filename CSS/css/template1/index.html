<style>
    * {
        margin: 0;
    }

    .outer-top {
        background-color: grey;
        margin: 10px;
    }

    .inner-top {
        margin: 15px;
        background-color: aqua;
    }

    .outer-bottom {
        margin: 20px;
        background-color: blue;
    }

    .inner-bottom {
        margin: 25px;
        background-color: rgb(34, 105, 167);
    }

    div {
        border: 1px solid black;
    }
</style>

<body>
    <div class="outer-top">
        <div class="inner-top">
            some content
        </div>
    </div>
    <div class="outer-bottom">
        <div class="inner-bottom">
            some more content
        </div>
    </div>
</body>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratcise transform </title>
    <style>
        * {
            box-sizing: border-box;
        }

        .gallery {
            background-color: gray;
            width: 90%;
            margin: auto;
            border: 2px solid brown;
            overflow: auto;
            height: 100vh;
            position: relative;

        }

        .person {
            background-color: rgb(25, 0, 255);
            width: 100%;
            position: absolute;
            float: left;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

        }

        .person img {
            width: 100%;
            display: block;
        }


        .person-caption {
            text-align: center;
            background-color: rgba(207, 207, 108, 0.3);
            /*position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            left: 100%;
            transition: all 1s;*/
        }

        .person-caption h2 {
            margin: 0;
            background-color: rgba(207, 207, 108, 0.5);
            padding: 10px;

        }

        .person-caption p {
            padding: 15px 0;
            font-size: small;

        }

        .person-caption p::first-line {
            background-color: red;

        }

        .person-caption p::first-letter {
            font-size: 40px;
        }

        /*  .person:hover {
            transform: scale(1.3);
        }*/

        .person:hover .person-caption {
            opacity: 1;
            left: 0;
            transform: rotate(360deg);
        }


        /*md*/
        @media screen and (min-width : 500px) {
            body {
                background-color: aqua;
            }

            .md-100 {
                width: 100%;
            }

            .md-50 {
                width: 50%;
            }

            .md-25 {
                width: 25%;
            }
        }

        /*lg*/
        @media screen and (min-width : 900px) {
            body {
                background-color: blueviolet;
            }

            .lg-100 {
                width: 100%;
            }

            .lg-50 {
                width: 50%;
            }

            .lg-25 {
                width: 25%;
            }
        }


        div {
            box-sizing: border-box;
            margin: 10px auto;
            padding: 10px;
            height: 160px;
        }

        .one {
            background-color: brown;

        }

        .two {
            background-color: green;
            width: 80%;
            margin-top: -100px;


        }

        .two_1 {
            background-color: yellow;
            height: 50px;
            position: relative;
            z-index: 4;


        }

        .two_2 {
            background-color: rgb(48, 221, 212);
            height: 50px;
            margin-top: -30px;
        }

        .three {
            background-color: blue;
            width: 50%;
            margin-top: -150px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="dialog-wrapper">
        <div class="dialog-content">
            <button class="close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-x">
                    <line x1="18" y1="6" x2="6" y2="18"></line>

                <span class="visually-hidden">

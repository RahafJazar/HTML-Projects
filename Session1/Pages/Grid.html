<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }

      .parent {
        background-color: tan;
        display: grid;
        grid-template-columns: [ali] 1fr [osama] 1fr [ayman] 2fr [rahaf];
        grid-template-rows: repeat(2, 300px);
        grid-auto-rows: minmax(100px, auto);
        /* justify-items: center;
            align-items: center; */
        /* place-items: center stretch; */
        row-gap: 20px;
        column-gap: 50px;
      }

      .child {
        border: 1px solid grey;
        background-color: tomato;
      }
      .child-1 {
        background-color: rgb(228, 120, 138);
      }
      .child-2 {
        background-color: blue;
        place-self: center center;
      }
      .child-3 {
        background-color: green;
      }
      .child-4 {
        background-color: gold;
      }
      .child-5 {
        background-color: navy;
      }
      .child-6 {
        background-color: violet;
      }
      .child-7 {
        background-color: crimson;
      }
      .child-8 {
        background-color: chartreuse;
      }

      .layout {
        margin-top: 30px;
        display: grid;
        grid-template-columns: 30% 30% 10% 30%;
        grid-template-areas:
          "header  header  header   header"
          "main    main     .       sidebar"
          "footer  footer  footer   footer ";
      }

      .header {
        background-color: orange;
        grid-area: header;
      }

      .main {
        background-color: blue;
        grid-area: main;
      }

      .sidebar {
        background-color: tomato;
        grid-area: sidebar;
      }

      .footer {
        background-color: green;
        grid-area: footer;
      }

      @media screen and (max-width: 768px) {
        .layout {
          grid-template-areas:
            "header"
            "main"
            "sidebar"
            "footer";
        }
      }

      .child-1 input:focus {
        background-color: rgb(141, 168, 65);
      }
      table thead tr th:nth-child(even),
      table tbody tr td:nth-child(even) {
        background-color: rgb(180, 174, 174);
      }
    </style>
  </head>

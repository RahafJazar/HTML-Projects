<!DOCTYPE html>
<html lang="en">

<head>

    <title>units</title>
    <style>
        :root {
            font-size: 10px;
        }

        .parent {
            padding: 40px;

        }

        .test {
            background-color: tomato;
            width: 25%;
            font-size: 1em;
            padding: 0.5em;
            margin: 0.5em;
        }

        @media screen and (min-width:500px) {
            :root {
                font-size: 15px;
            }

            .parent {
                font-size: 12px;
            }
        }

        @media screen and (min-width :900px) {
            :root {
                font-size: 18px;
            }

            .parent {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="test">

</html>

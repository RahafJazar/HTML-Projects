<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Box</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    .parent {
      background-color: rgb(138, 160, 138);
      display: flex;
      flex-flow: row nowrap;
      justify-content: flex-start;
      width: 500px;
      height: 100vh;
    }
    .child {
      flex-basis: 200px;
      background-color: tomato;
      border: 2px solid teal;
    }
    .child-1 {
      background-color: green;
      order: 0;
      flex: 1 0 200px;
    }
    .child-2 {
      background-color: rgb(187, 159, 37);
      order: 0;
      flex-grow: 3;
      flex-shrink: 2;
    }
    .child-3 {
      background-color: rgb(88, 21, 66);
      order: 0;
      align-self: flex-end;
    }
    .child-4 {
      background-color: rgb(221, 115, 66);
      order: 0;
    }
    .child-5 {
      background-color: rgb(133, 36, 36);
      order: 0;
    }
  </style>
  <body>
    <div class="parent">
      <div class="child child-1">
        <h2>child-1</h2>
      </div>
      <div class="child child-2">
        <h2>child-2</h2>
      </div>
      <div class="child child-3">
        <h2>child-3</h2>
      </div>
      <div class="child child-4">
        <h2>child-4</h2>
      </div>
      <div class="child child-5">
        <h2>child-5</h2>
      </div>
    </div>
  </body>
</html>

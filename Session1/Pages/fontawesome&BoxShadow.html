<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--fontawesome-->
    <link rel="stylesheet" href="../css/all.min.css">
    <!---My style-->
    <link rel="stylesheet" href="../css/style.css">
    <title>Document</title>

    <style>
        i {
            color: green;
            font-size: 50px;
            transform: rotate(180deg);

        }

        .box {
            width: 200px;
            height: 200px;
            background-color: rgb(187, 187, 215);
            margin-top: 100px;
            border: 1px solid pink;
            box-shadow: 20px 5px 10px green;
            transition: box-shadow 1s;

        }

        .box:hover {
            box-shadow: 20px 10px 4px 10px green;
        }

        .red-text-shadow {
            text-shadow: 3px 2px 2px red;
        }
    </style>
</head>

<body>
    <i class="fa-solid fa-alarm-clock fa-beat"></i>
    <i class="fa-brands fa-twitter"></i>

    <div class="box">
        <p class="red-text-shadow">Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestiae facere ratione
            facilis a voluptate. Facere
            id libero corrupti itaque nam.</p>
    </div>
</body>

</html>
